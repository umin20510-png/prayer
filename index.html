<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>기도제목 나눔 🙏</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#F7F5F0; --surface:#fff; --border:rgba(0,0,0,.09);
  --text:#1A1A1A; --muted:#888; --accent:#4A3F8F;
  --accent-light:#EEEDFE; --accent-text:#3C3489;
  --green:#0F6E56; --green-light:#E1F5EE;
  --amber:#854F0B; --amber-light:#FAEEDA;
  --red:#B91C1C; --red-light:#FEE2E2;
  --r:14px; --rs:8px;
}
html,body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%}
.wrap{max-width:480px;margin:0 auto;padding:0 16px 80px}

/* header */
.hd{text-align:center;padding:40px 0 28px}
.pill{display:inline-block;background:var(--accent-light);color:var(--accent-text);font-size:12px;font-weight:500;padding:4px 14px;border-radius:20px;margin-bottom:12px}
.hd h1{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:600;letter-spacing:-.02em;margin-bottom:5px}
.hd p{font-size:13px;color:var(--muted)}

/* tabs */
.tabs{background:rgba(0,0,0,.05);border-radius:12px;padding:4px;display:flex;gap:3px;margin-bottom:20px}
.tab{flex:1;text-align:center;padding:9px 0;font-size:14px;border-radius:9px;cursor:pointer;color:var(--muted);transition:all .2s;user-select:none}
.tab.on{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:block}
.req{color:var(--accent);margin-left:2px}

input[type=text],input[type=password],textarea{
  width:100%;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:var(--text);
  background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);
  padding:11px 14px;-webkit-appearance:none;appearance:none;transition:border-color .2s}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:#bbb}
textarea{height:96px;resize:none;line-height:1.6}

/* chips */
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:13px;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.chip.on{background:var(--accent-light);color:var(--accent-text);border-color:#AFA9EC;font-weight:500}

/* cats */
.cats{display:flex;flex-wrap:wrap;gap:8px}
.cat{font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none}
.cat.on{background:var(--accent-light);color:var(--accent-text);border-color:#AFA9EC}

/* privacy */
.prv{display:flex;gap:8px}
.prv-btn{flex:1;padding:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.prv-btn.on{background:var(--green-light);color:var(--green);border-color:#5DCAA5;font-weight:500}

/* deadline */
.dl-bar{background:var(--accent-light);border:1px solid #CECBF6;border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--accent-text);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* submit */
.sub-btn{width:100%;padding:14px;font-size:15px;font-weight:500;font-family:'Noto Sans KR',sans-serif;background:var(--accent);color:#fff;border:none;border-radius:var(--r);cursor:pointer;margin-top:4px;transition:opacity .15s,transform .1s}
.sub-btn:hover{opacity:.9}.sub-btn:active{transform:scale(.98)}.sub-btn:disabled{opacity:.5;cursor:not-allowed}

/* success */
.ok{display:none;text-align:center;padding:48px 0 32px}
.ok-icon{font-size:44px;margin-bottom:14px;display:block}
.ok h2{font-family:'Noto Serif KR',serif;font-size:22px;margin-bottom:8px}
.ok p{font-size:14px;color:var(--muted);margin-bottom:24px}
.out-btn{display:inline-block;padding:10px 26px;font-size:14px;font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:24px;cursor:pointer}

/* list toolbar */
.lt{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.lc{font-size:13px;color:var(--muted);white-space:nowrap}
.ic-btn{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif}
.ic-btn.on{background:var(--amber-light);color:var(--amber);border-color:#EF9F27;font-weight:500}

/* delete toolbar */
.del-bar{display:none;background:var(--red-light);border:1px solid #FECACA;border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;align-items:center;justify-content:space-between;gap:8px}
.del-bar.show{display:flex}
.sa-btn{font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--red);background:transparent;border:1px solid #FECACA;border-radius:20px;padding:5px 12px;cursor:pointer;white-space:nowrap}
.sa-btn.on{background:var(--red);color:#fff;border-color:var(--red)}
.sc{font-size:13px;color:var(--red);flex:1;text-align:center}
.d-btn{font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--red);color:#fff;border:none;border-radius:20px;padding:6px 16px;cursor:pointer;white-space:nowrap}
.d-btn:disabled{opacity:.4;cursor:not-allowed}

/* group filter */
.gf{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.gf::-webkit-scrollbar{display:none}
.gf-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.gf-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}

/* prayer item */
.pi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;animation:fu .22s ease both;transition:border-color .15s,background .15s}
.pi.sel{border-color:var(--red);background:#FFF8F8}
.pi-row{display:flex;gap:10px;align-items:flex-start}
.pi-cb{width:18px;height:18px;margin-top:3px;accent-color:var(--red);flex-shrink:0;cursor:pointer;display:none}
.pi-cb.show{display:block}
.pi-body{flex:1;min-width:0}
.pi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px}
.pi-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0}
.av{width:30px;height:30px;border-radius:50%;background:var(--accent-light);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.av.priv{background:var(--amber-light);color:var(--amber)}
.pi-name{font-size:14px;font-weight:500}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bg{background:var(--accent-light);color:var(--accent-text)}
.bc{background:var(--green-light);color:var(--green)}
.bp{background:var(--amber-light);color:var(--amber)}
.pi-date{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.pi-text{font-size:14px;line-height:1.65;word-break:break-word}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r);padding:28px 22px 22px;width:100%;max-width:300px}
.modal h3{font-size:17px;font-weight:500;margin-bottom:6px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.merr{font-size:13px;color:var(--red);margin-top:8px;display:none}
.mbtns{display:flex;gap:8px;margin-top:14px}
.mbtns button{flex:1;padding:11px;border-radius:var(--rs);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
.m-cancel{background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.m-ok{background:var(--accent);border:none;color:#fff;font-weight:500}
.m-danger{background:var(--red);border:none;color:#fff;font-weight:500}

.empty{text-align:center;padding:40px 0;color:var(--muted);font-size:14px;line-height:1.8}
.empty span{font-size:30px;display:block;margin-bottom:10px}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- 리더 모달 -->
<div class="modal-bg" id="mLeader">
  <div class="modal">
    <h3>🔑 리더 확인</h3>
    <p>리더 비밀번호를 입력해주세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호" />
    <div class="merr" id="pwErr">비밀번호가 틀렸어요</div>
    <div class="mbtns">
      <button class="m-cancel" id="btnLeaderCancel">취소</button>
      <button class="m-ok"     id="btnLeaderOk">확인</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-bg" id="mDelete">
  <div class="modal">
    <h3>🗑️ 삭제 확인</h3>
    <p id="delMsg">선택한 기도제목을 삭제할까요?<br>삭제하면 되돌릴 수 없어요.</p>
    <div class="mbtns">
      <button class="m-cancel" id="btnDelCancel">취소</button>
      <button class="m-danger" id="btnDelOk">삭제하기</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="hd">
    <div class="pill" id="weekPill"></div>
    <h1>기도제목 나눔 🙏</h1>
    <p>1청 1진 3팀</p>
  </div>

  <div class="tabs">
    <div class="tab on" id="tabWrite">기도제목 쓰기</div>
    <div class="tab"    id="tabList">함께 기도하기</div>
  </div>

  <!-- 쓰기 탭 -->
  <div id="writeTab">
    <div id="formArea">
      <div class="dl-bar" id="dlBar" style="display:none">
        <span>⏰</span><span>마감까지 <strong id="cdText"></strong> 남았어요</span>
      </div>

      <div class="card">
        <span class="lbl">조 선택 <span class="req">*</span></span>
        <div class="chips">
          <div class="chip" id="g0">곽유민조</div>
          <div class="chip" id="g1">김유민조</div>
          <div class="chip" id="g2">김정주조</div>
        </div>
      </div>

      <div class="card">
        <span class="lbl">이름 (선택)</span>
        <input type="text" id="nameInput" placeholder="익명으로 남기려면 비워두세요" />
      </div>

      <div class="card">
        <span class="lbl">이번 주 기도제목 <span class="req">*</span></span>
        <textarea id="prayerInput" placeholder="짧게 한 줄도 괜찮아요 ✍️"></textarea>
      </div>

      <div class="card">
        <span class="lbl">카테고리 (선택)</span>
        <div class="cats">
          <div class="cat">건강</div>
          <div class="cat">학업·직장</div>
          <div class="cat">가족</div>
          <div class="cat">신앙·영적성장</div>
          <div class="cat">관계</div>
          <div class="cat">기타</div>
        </div>
      </div>

      <div class="card">
        <span class="lbl">공개 범위</span>
        <div class="prv">
          <button class="prv-btn on" id="btnPub">✅ 모임에서 공개</button>
          <button class="prv-btn"    id="btnPri">🔒 리더만 보기</button>
        </div>
      </div>

      <button class="sub-btn" id="btnSubmit">기도제목 제출하기</button>
    </div>

    <div class="ok" id="okMsg">
      <span class="ok-icon">🙏</span>
      <h2>기도해드릴게요!</h2>
      <p>제출해줘서 고마워요<br>함께 기도할게요</p>
      <button class="out-btn" id="btnReset">다시 작성하기</button>
    </div>
  </div>

  <!-- 보기 탭 -->
  <div id="listTab" style="display:none">
    <div class="lt">
      <span class="lc" id="listCount">불러오는 중...</span>
      <div style="display:flex;gap:6px">
        <button class="ic-btn" id="btnRefresh">↻ 새로고침</button>
        <button class="ic-btn" id="btnLeader">🔑 리더 보기</button>
      </div>
    </div>

    <div class="del-bar" id="delBar">
      <button class="sa-btn" id="btnSelAll">전체 선택</button>
      <span class="sc" id="selCount">0개 선택</span>
      <button class="d-btn" id="btnDel" disabled>삭제</button>
    </div>

    <div class="gf">
      <div class="gf-btn on" data-group="전체">전체</div>
      <div class="gf-btn"    data-group="곽유민조">곽유민조</div>
      <div class="gf-btn"    data-group="김유민조">김유민조</div>
      <div class="gf-btn"    data-group="김정주조">김정주조</div>
    </div>

    <div id="prayerList">
      <div class="empty"><span>⏳</span>불러오는 중...</div>
    </div>
  </div>
</div>

<script>
// ── 설정 ────────────────────────────────────────
var SHEET_ID  = '1aaNhTPo1NYcLVY_-sgSmvNXzjvkvniTMwkk5WvHjuQk';
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbzHriSSDhI27yh0YylMdlVm2ZwJ5NK1ZsQ7NEdXAT7ZruqiVYBWlxghTWtkHmpb6hOl/exec';
var LEADER_PW = '0691';
var GVIZ      = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json';

// ── 상태 ────────────────────────────────────────
var privacy   = 'public';
var selGroup  = '';
var isLeader  = false;
var gFilter   = '전체';
var allRows   = [];
var visible   = [];
var checked   = [];

// ── 유틸 ────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function show(id){ $(id).style.display = 'block'; }
function hide(id){ $(id).style.display = 'none'; }
function hasClass(el, c){ return el.classList.contains(c); }
function addClass(el, c){ el.classList.add(c); }
function removeClass(el, c){ el.classList.remove(c); }
function inChecked(v){ return checked.indexOf(v) !== -1; }

// ── 주차 ────────────────────────────────────────
(function(){
  var d = new Date(), w = Math.ceil(d.getDate()/7);
  $('weekPill').textContent = d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+w+'주차';
})();

// ── 카운트다운 ───────────────────────────────────
(function(){
  var now = new Date(), day = now.getDay();
  if((day===2 && now.getHours()>=18)||(day>=3&&day<=6)) return;
  $('dlBar').style.display = 'flex';
  function tick(){
    var n=new Date(), next=new Date(n), d=(2-n.getDay()+7)%7||7;
    next.setDate(n.getDate()+d); next.setHours(18,0,0,0);
    var diff=next-n;
    if(diff<=0){ $('dlBar').style.display='none'; return; }
    $('cdText').textContent = Math.floor(diff/3600000)+'시간 '+Math.floor((diff%3600000)/60000)+'분';
  }
  tick(); setInterval(tick,60000);
})();

// ── 탭 전환 ─────────────────────────────────────
$('tabWrite').addEventListener('click', function(){
  addClass($('tabWrite'),'on'); removeClass($('tabList'),'on');
  show('writeTab'); hide('listTab');
});
$('tabList').addEventListener('click', function(){
  addClass($('tabList'),'on'); removeClass($('tabWrite'),'on');
  hide('writeTab'); show('listTab');
  fetchAndRender();
});

// ── 조 선택 ─────────────────────────────────────
['g0','g1','g2'].forEach(function(id){
  $(id).addEventListener('click', function(){
    ['g0','g1','g2'].forEach(function(i){ removeClass($(i),'on'); });
    addClass($(id),'on');
    selGroup = $(id).textContent;
  });
});

// ── 카테고리 ─────────────────────────────────────
document.querySelectorAll('.cat').forEach(function(el){
  el.addEventListener('click', function(){ el.classList.toggle('on'); });
});

// ── 공개범위 ─────────────────────────────────────
$('btnPub').addEventListener('click', function(){
  privacy='public'; addClass($('btnPub'),'on'); removeClass($('btnPri'),'on');
});
$('btnPri').addEventListener('click', function(){
  privacy='private'; addClass($('btnPri'),'on'); removeClass($('btnPub'),'on');
});

// ── 제출 ─────────────────────────────────────────
$('btnSubmit').addEventListener('click', function(){
  if(!selGroup){
    document.querySelectorAll('.chip').forEach(function(c){
      c.style.borderColor='var(--red)';
      setTimeout(function(){ c.style.borderColor=''; },1200);
    });
    return;
  }
  var text = $('prayerInput').value.trim();
  if(!text){
    $('prayerInput').style.borderColor='var(--red)';
    $('prayerInput').focus();
    setTimeout(function(){ $('prayerInput').style.borderColor=''; },1200);
    return;
  }
  var name = $('nameInput').value.trim() || '익명';
  var cats = [];
  document.querySelectorAll('.cat.on').forEach(function(c){ cats.push(c.textContent); });

  $('btnSubmit').textContent='제출 중...';
  $('btnSubmit').disabled=true;

  fetch(SHEET_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name:name, prayer:text, category:cats.join(', '), privacy:privacy, group:selGroup})
  }).catch(function(){}).finally(function(){
    $('btnSubmit').textContent='기도제목 제출하기';
    $('btnSubmit').disabled=false;
    hide('formArea'); show('okMsg');
  });
});

// ── 다시 작성 ─────────────────────────────────────
$('btnReset').addEventListener('click', function(){
  $('prayerInput').value=''; $('nameInput').value='';
  document.querySelectorAll('.cat').forEach(function(c){ removeClass(c,'on'); });
  ['g0','g1','g2'].forEach(function(i){ removeClass($(i),'on'); });
  selGroup=''; privacy='public';
  addClass($('btnPub'),'on'); removeClass($('btnPri'),'on');
  show('formArea'); hide('okMsg');
});

// ── 새로고침 ─────────────────────────────────────
$('btnRefresh').addEventListener('click', fetchAndRender);

// ── 리더 모달 ────────────────────────────────────
$('btnLeader').addEventListener('click', function(){
  if(isLeader){
    isLeader=false; checked=[];
    removeClass($('btnLeader'),'on');
    $('btnLeader').textContent='🔑 리더 보기';
    removeClass($('delBar'),'show');
    renderList();
  } else {
    addClass($('mLeader'),'open');
    setTimeout(function(){ $('pwInput').focus(); },100);
  }
});
$('btnLeaderCancel').addEventListener('click', function(){
  removeClass($('mLeader'),'open');
  $('pwInput').value=''; $('pwErr').style.display='none';
});
$('btnLeaderOk').addEventListener('click', function(){
  if($('pwInput').value===LEADER_PW){
    isLeader=true;
    addClass($('btnLeader'),'on');
    $('btnLeader').textContent='✅ 리더 모드';
    addClass($('delBar'),'show');
    removeClass($('mLeader'),'open');
    $('pwInput').value=''; $('pwErr').style.display='none';
    renderList();
  } else {
    $('pwErr').style.display='block';
  }
});
$('pwInput').addEventListener('keydown', function(e){
  if(e.key==='Enter') $('btnLeaderOk').click();
});

// ── 조 필터 ─────────────────────────────────────
document.querySelectorAll('.gf-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.gf-btn').forEach(function(b){ removeClass(b,'on'); });
    addClass(btn,'on');
    gFilter = btn.dataset.group;
    checked=[];
    renderList();
  });
});

// ── 전체선택 ─────────────────────────────────────
$('btnSelAll').addEventListener('click', function(){
  var allSel = checked.length === visible.length && visible.length > 0;
  if(allSel){
    checked=[];
    removeClass($('btnSelAll'),'on');
    $('btnSelAll').textContent='전체 선택';
  } else {
    checked = visible.map(function(r){ return r.rowIndex; });
    addClass($('btnSelAll'),'on');
    $('btnSelAll').textContent='전체 해제';
  }
  updateDelUI();
  renderList();
});

// ── 삭제 버튼 ────────────────────────────────────
$('btnDel').addEventListener('click', function(){
  if(!checked.length) return;
  var isAll = checked.length===visible.length;
  $('delMsg').innerHTML = isAll
    ? '전체 기도제목을 삭제할까요?<br>삭제하면 되돌릴 수 없어요.'
    : checked.length+'개의 기도제목을 삭제할까요?<br>삭제하면 되돌릴 수 없어요.';
  addClass($('mDelete'),'open');
});
$('btnDelCancel').addEventListener('click', function(){ removeClass($('mDelete'),'open'); });
$('btnDelOk').addEventListener('click', function(){
  removeClass($('mDelete'),'open');
  var indexes = checked.slice();
  $('btnDel').textContent='삭제 중...'; $('btnDel').disabled=true;

  var old=document.getElementById('__del'); if(old) old.remove();

  window.__delCb = function(){
    // 로컬에서 즉시 제거
    allRows = allRows.filter(function(r){ return indexes.indexOf(r.rowIndex)===-1; });
    checked=[];
    $('btnDel').textContent='삭제'; $('btnDel').disabled=true;
    $('selCount').textContent='0개 선택';
    removeClass($('btnSelAll'),'on');
    $('btnSelAll').textContent='전체 선택';
    renderList();
  };

  var s=document.createElement('script');
  s.id='__del';
  s.src=SHEET_URL+'?action=delete&rows='+indexes.join(',')+'&callback=__delCb&t='+Date.now();
  document.head.appendChild(s);
});

// ── 개별 체크 ────────────────────────────────────
function toggleCheck(rowIndex){
  var i = checked.indexOf(rowIndex);
  if(i===-1) checked.push(rowIndex);
  else checked.splice(i,1);
  updateDelUI();
  // 해당 카드만 업데이트
  var card = document.querySelector('[data-idx="'+rowIndex+'"]');
  if(card){
    if(inChecked(rowIndex)) addClass(card,'sel'); else removeClass(card,'sel');
    var cb = card.querySelector('.pi-cb');
    if(cb) cb.checked = inChecked(rowIndex);
  }
}

function updateDelUI(){
  var n=checked.length;
  $('selCount').textContent=n+'개 선택';
  $('btnDel').disabled=n===0;
  var allSel=n===visible.length&&visible.length>0;
  if(allSel){ addClass($('btnSelAll'),'on'); $('btnSelAll').textContent='전체 해제'; }
  else { removeClass($('btnSelAll'),'on'); $('btnSelAll').textContent='전체 선택'; }
}

// ── 데이터 불러오기 (gviz JSONP) ─────────────────
function fetchAndRender(){
  $('listCount').textContent='불러오는 중...';
  $('prayerList').innerHTML='<div class="empty"><span>⏳</span>불러오는 중...</div>';
  checked=[]; updateDelUI();

  var old=document.getElementById('__gviz'); if(old) old.remove();

  var timer=setTimeout(function(){
    $('prayerList').innerHTML='<div class="empty"><span>⚠️</span>불러오기 실패<br><small>구글 시트 공유 설정을 확인해주세요<br>(링크가 있는 모든 사용자 → 뷰어)</small></div>';
    $('listCount').textContent='오류';
  },10000);

  window.google=window.google||{};
  window.google.visualization=window.google.visualization||{};
  window.google.visualization.Query=window.google.visualization.Query||{};
  window.google.visualization.Query.setResponse=function(res){
    clearTimeout(timer);
    try{
      var rows=(res.table&&res.table.rows)?res.table.rows:[];
      allRows=rows.map(function(r,i){
        var c=r.c||[];
        return {
          rowIndex:i+2,
          date:    c[0]&&c[0].v?String(c[0].v):'',
          name:    c[1]&&c[1].v?String(c[1].v):'',
          prayer:  c[2]&&c[2].v?String(c[2].v):'',
          category:c[3]&&c[3].v?String(c[3].v):'',
          privacy: c[4]&&c[4].v?String(c[4].v):'',
          group:   c[5]&&c[5].v?String(c[5].v):''
        };
      }).filter(function(r){ return r.prayer.trim()!==''; });
      renderList();
    }catch(err){
      $('prayerList').innerHTML='<div class="empty"><span>⚠️</span>파싱 오류</div>';
    }
  };

  var s=document.createElement('script');
  s.id='__gviz';
  s.src=GVIZ+'&t='+Date.now();
  document.head.appendChild(s);
}

// ── 렌더링 ───────────────────────────────────────
function renderList(){
  var rows=allRows;
  if(!isLeader){
    rows=rows.filter(function(r){
      var p=(r.privacy||'').trim();
      return p==='public'||p==='모임에서 공개'||p==='';
    });
  }
  if(gFilter!=='전체') rows=rows.filter(function(r){ return r.group===gFilter; });
  visible=rows.slice().reverse();

  $('listCount').textContent=visible.length+'개의 기도제목';
  var container=$('prayerList');

  if(!visible.length){
    container.innerHTML='<div class="empty"><span>🕊️</span>아직 기도제목이 없어요<br>첫 번째로 나눠보세요!</div>';
    return;
  }

  container.innerHTML=visible.map(function(p,i){
    var init=(!p.name||p.name==='익명')?'?':p.name.slice(0,1);
    var priv=(p.privacy||'').trim()==='private'||(p.privacy||'').trim()==='리더만 보기';
    var sel=inChecked(p.rowIndex);
    var gB=p.group?'<span class="badge bg">'+p.group+'</span>':'';
    var cB=p.category?'<span class="badge bc">'+p.category.split(',')[0].trim()+'</span>':'';
    var pB=priv?'<span class="badge bp">🔒 비공개</span>':'';
    var dS=p.date?'<span class="pi-date">'+String(p.date).slice(0,10)+'</span>':'';
    var txt=String(p.prayer||'').replace(/</g,'&lt;');
    return '<div class="pi'+(sel?' sel':'')+'" data-idx="'+p.rowIndex+'" style="animation-delay:'+(i*.04)+'s">'+
      '<div class="pi-row">'+
        '<input type="checkbox" class="pi-cb'+(isLeader?' show':'')+'"'+(sel?' checked':'')+
          ' onchange="toggleCheck('+p.rowIndex+')" />'+
        '<div class="pi-body">'+
          '<div class="pi-top">'+
            '<div class="pi-left">'+
              '<div class="av'+(priv?' priv':'')+'">'+init+'</div>'+
              '<span class="pi-name">'+(p.name||'익명')+'</span>'+gB+cB+pB+
            '</div>'+dS+
          '</div>'+
          '<p class="pi-text">'+txt+'</p>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}
</script>
